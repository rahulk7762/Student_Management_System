<!DOCTYPE html>
<html xmlns:th="http:www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
  rel="stylesheet"
  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
  crossorigin="anonymous"
>
</head>
<body>
  <!-- NavBar Start  -->
  <nav class="navbar navbar-expand-md bg-dark navbar-dark">
    <!-- Brand -->
    <a
      class="navbar-brand"
      href="#"
    >Student Management System</a>
    <!-- Toggler/collapsible Button -->
    <button
      class="navbar-toggler"
      type="button"
      data-toggle="collapse"
      data-target="#collapsibleNavbar"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <!-- Navbar links -->
    <div
      class="collapse navbar-collapse"
      id="collapsibleNavbar"
    >
      <ul class="navbar-nav">
        <li class="nav-item"><a
          class="nav-link"
          th:href="@{students}"
        >Student Management</a></li>
      </ul>
    </div>
  </nav>
  <!-- NavBar End -->
  <div class="container">
    <div class="row">
      <h2 class="text-center">Students Lists</h2>
    </div>
    <div class="row">
      <div class="col-lg-3">
        <a
          th:href="@{students/new}"
          class="btn btn-primary btn-sm mb-3"
        >Add Student</a>
      </div>
    </div>
    <table class="table table-striped table-border">
      <thead>
        <tr>
          <th>FirstName</th>
          <th>LastName</th>
          <th>Email</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="allStudents : ${students}">
          <td th:text="${allStudents.firstName}"></td>
          <td th:text="${allStudents.lastName}"></td>
          <td th:text="${allStudents.email}"></td>
          <td><a th:href="@{/students/edit/{id}(id=${allStudents.id})}" class="btn btn-info">Update</a></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Students List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Student Management</a>
    </div>
</nav>

<div class="container mt-5">

    <!-- Title + Button -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Student List</h3>
        <a th:href="@{/students/new}" class="btn btn-primary">
            + Add Student
        </a>
    </div>

    <!-- Table Card -->
    <div class="card shadow">
        <div class="card-body">

            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th style="width: 200px;">Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="allStudents : ${students}">
                        <td th:text="${allStudents.firstName}"></td>
                        <td th:text="${allStudents.lastName}"></td>
                        <td th:text="${allStudents.email}"></td>

                        <td>
                            <a th:href="@{/students/edit/{id}(id=${allStudents.id})}" 
                               class="btn btn-sm btn-warning me-2">
                                Edit
                            </a>

                            <a th:href="@{/students/{id}(id=${allStudents.id})}" 
                               class="btn btn-sm btn-danger">
                                Delete
                            </a>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
